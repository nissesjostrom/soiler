[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
lib_deps =
	lvgl/lvgl@^8.3.11
	bodmer/TFT_eSPI@^2.5.43
build_flags =
	-D USER_SETUP_LOADED
	-D ILI9341_DRIVER
	-D TFT_WIDTH=240
	-D TFT_HEIGHT=320
	-D TFT_MISO=12
	-D TFT_MOSI=13
	-D TFT_SCLK=14
	-D TFT_CS=15
	-D TFT_DC=2
	-D TFT_RST=-1
	-D TFT_BL=21
	-D SPI_FREQUENCY=40000000
	-D LV_CONF_INCLUDE_SIMPLE
